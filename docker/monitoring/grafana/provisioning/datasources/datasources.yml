apiVersion: 1

deleteDatasources:
  - name: Prometheus
    orgId: 1
  - name: Jaeger
    orgId: 1
  - name: Tempo
    orgId: 1

datasources:
  - name: Tempo
    uid: Tempo
    type: tempo
    access: proxy
    url: http://nexent-tempo:3200
    isDefault: true
    editable: true
    basicAuth: false
    jsonData:
      nodeGraph:
        enabled: true
      search:
        hide: false
      traceQuery:
        timeShiftEnabled: true
        spanStartTimeShift: "-1h"
        spanEndTimeShift: "1h"
      streamingEnabled:
        search: false
        metrics: false
