name: Build Offline Deployment Package

on:
  workflow_dispatch:
    inputs:
      ref_type:
        description: 'Reference type: tag, main, or branch'
        required: true
        default: 'main'
        type: choice
        options:
          - tag
          - main
          - branch
      ref_name:
        description: 'Tag name (e.g. v1.0.0) or branch name (e.g. feature/xyz). Leave empty if ref_type is main.'
        required: false
        default: ''

jobs:
  build-offline-package:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        platform: [amd64, arm64]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.set-vars.outputs.git-ref }}
      
      - name: Set version and platform variables
        id: set-vars
        run: |
          REF_TYPE="${{ inputs.ref_type }}"
          REF_NAME="${{ inputs.ref_name }}"
          PLATFORM="${{ matrix.platform }}"
          
          # Set image version and git ref based on ref_type
          case "$REF_TYPE" in
            tag)
              IMAGE_VERSION="${REF_NAME}"
              GIT_REF="refs/tags/${REF_NAME}"
              ;;
            main)
              IMAGE_VERSION="latest"
              GIT_REF="main"
              ;;
            branch)
              IMAGE_VERSION="${REF_NAME}"
              GIT_REF="${REF_NAME}"
              ;;
          esac
          
          # Sanitize branch name for package name (replace / with -)
          SAFE_NAME=$(echo "${IMAGE_VERSION}" | sed 's/\//-/g')
          
          echo "image-version=${IMAGE_VERSION}" >> $GITHUB_OUTPUT
          echo "git-ref=${GIT_REF}" >> $GITHUB_OUTPUT
          echo "platform=${PLATFORM}" >> $GITHUB_OUTPUT
          echo "package-name=nexent-offline-${PLATFORM}-${SAFE_NAME}" >> $GITHUB_OUTPUT
      
      - name: Build offline package
        run: |
          chmod +x scripts/offline/build_offline_package.sh
          
          ./scripts/offline/build_offline_package.sh \
            --version "${{ steps.set-vars.outputs.image-version }}" \
            --platform "${{ matrix.platform }}" \
            --output-dir ./offline-output \
            --include-source "true"
      
      
      
      - name: Create ZIP package
        run: |
          PACKAGE_NAME="${{ steps.set-vars.outputs.package-name }}"
          
          cd offline-output
          zip -r "../${PACKAGE_NAME}.zip" .
          cd ..
          
          echo "Package created: ${PACKAGE_NAME}.zip"
          
          ls -lh "${PACKAGE_NAME}.zip"
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.set-vars.outputs.package-name }}
          path: ${{ steps.set-vars.outputs.package-name }}.zip
          retention-days: 30
      
      - name: Summary
        run: |
          echo ""
          echo "========================================"
          echo "Offline Package Build Summary"
          echo "========================================"
          echo "Reference Type: ${{ inputs.ref_type }}"
          echo "Reference Name: ${{ inputs.ref_name }}"
          echo "Image Version: ${{ steps.set-vars.outputs.image-version }}"
          echo "Git Ref: ${{ steps.set-vars.outputs.git-ref }}"
          echo "Platform: ${{ matrix.platform }}"
          echo "Package: ${{ steps.set-vars.outputs.package-name }}.zip"
          echo "========================================"
          echo ""
          echo "Package contents:"
          unzip -l "${{ steps.set-vars.outputs.package-name }}.zip" | head -50