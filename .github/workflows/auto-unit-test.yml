name: Run Automated Unit Tests

concurrency:
  group: automated-unit-test-${{ github.ref }}
  cancel-in-progress: true

on:
  workflow_dispatch:
    inputs:
      runner_label_json:
        description: 'runner array in json format (e.g. ["ubuntu-latest"] or ["self-hosted"])'
        required: false
        default: '["ubuntu-24.04-arm"]'
      pytest_workers:
        description: 'parallel test workers (auto=CPU count, 0=serial, N=fixed count)'
        required: false
        default: 'auto'
      pytest_file_timeout:
        description: 'per-file timeout in seconds (0=disabled)'
        required: false
        default: '300'
  pull_request:
    branches: [develop, 'release/**', 'hotfix/**']
    paths:
      - 'backend/**'
      - 'sdk/**'
      - 'deploy/common/**'
      - 'deploy/tests/**'
      - 'deploy/offline/**'
      - 'deploy/docker/**'
      - 'deploy/k8s/**'
      - 'test/**'
      - '.github/workflows/**'
  push:
    branches: [develop, 'release/**', 'hotfix/**']
    paths:
      - 'backend/**'
      - 'sdk/**'
      - 'deploy/common/**'
      - 'deploy/tests/**'
      - 'deploy/offline/**'
      - 'deploy/docker/**'
      - 'deploy/k8s/**'
      - 'test/**'
      - '.github/workflows/**'

jobs:
  test:
    runs-on: ${{ fromJson(github.event.inputs.runner_label_json || '["ubuntu-24.04-arm"]') }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run deployment script tests
        run: |
          bash deploy/tests/test_common.sh
          bash deploy/tests/test_sql_migrations.sh
          bash deploy/tests/test_build_offline_package.sh

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install uv
        run: pip install --upgrade uv

      - name: Install dependencies
        run: |
          cd backend
          uv sync --extra data-process --extra test
          uv pip install -e "../sdk[dev]"
          cd ..

      - name: Run all tests and collect coverage
        env:
          NEXENT_PYTEST_WORKERS: ${{ github.event.inputs.pytest_workers || 'auto' }}
          NEXENT_PYTEST_FILE_TIMEOUT: ${{ github.event.inputs.pytest_file_timeout || '300' }}
        run: |
          source backend/.venv/bin/activate && python test/run_all_test.py
          TEST_EXIT_CODE=$?

          if [ -f "test/coverage.xml" ]; then
            echo "Coverage XML file generated successfully."
          else
            echo "Coverage XML file not found."
            exit 1
          fi

          if [ $TEST_EXIT_CODE -ne 0 ]; then
            echo "Tests failed with exit code $TEST_EXIT_CODE"
            exit $TEST_EXIT_CODE
          else
            echo "All tests passed successfully."
          fi

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: test/coverage.xml
          token: ${{ secrets.CODECOV_TOKEN }}
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false
          verbose: true
