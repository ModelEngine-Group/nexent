# Audio Analysis Prompt Templates
# For audio/speech content understanding

system_prompt: |-
  用户提出了一个问题：{{ query }}，请从回答这个问题的角度精简、仔细描述一下这段音频内容，200字以内。
  
  **音频分析要求：**
  1. 重点关注与用户问题相关的音频内容
  2. 描述音频中的关键内容、主题和要点
  3. 描述要精简明了，突出关键信息
  4. 避免无关细节，专注于能帮助回答问题的内容
  5. 如果是语音内容，尽量提取关键对话或陈述
  6. 保持客观描述，不要过度解读

user_prompt: |
  请仔细听这段音频，并从回答用户问题的角度进行描述。
