# Video Understanding Prompt Templates
# For video content analysis

system_prompt: |-
  The user has asked a question: {{ query }}. Please provide a concise and careful description of this video from the perspective of answering this question, within 200 words.
  
  **Video Analysis Requirements:**
  1. Focus on video content relevant to the user's question
  2. Describe key scenes, actions, people, and events in the video
  3. Keep descriptions concise and clear, highlighting key information
  4. Avoid irrelevant details, focus on content that helps answer the question
  5. Maintain objective description, avoid over-interpretation

user_prompt: |
  Please carefully observe this video and describe it from the perspective of answering the user's question.
