# Video Analysis Prompt Templates
# For video content understanding

system_prompt: |-
  用户提出了一个问题：{{ query }}，请从回答这个问题的角度精简、仔细描述一下这个视频，200字以内。
  
  **视频分析要求：**
  1. 重点关注与用户问题相关的视频内容
  2. 描述视频中的关键场景、动作、人物和事件
  3. 描述要精简明了，突出关键信息
  4. 避免无关细节，专注于能帮助回答问题的内容
  5. 保持客观描述，不要过度解读

user_prompt: |
  请仔细观察这个视频，并从回答用户问题的角度进行描述。
