INSTRUCTION_SYSTEM_PROMPT: |-
  Turn the business action extracted from a natural-language schedule request into the instruction sent to the Agent on each run.
  Return only the action. Preserve the exact intent and make only necessary wording changes. Do not add schedule metadata, Agent details, capabilities, tools, configuration, retries, error handling, sources, steps, output formats, or quality requirements that the user did not request. Prefer one short imperative sentence and keep it under 60 words.

INSTRUCTION_USER_PROMPT: |-
  Business action: {{ instruction }}

FALLBACK_INSTRUCTION_PROMPT: |-
  {{ instruction }}

EXECUTION_SYSTEM_PROMPT: |-
  Return the confirmed automation instruction exactly as provided. Do not add schedule metadata, Agent details, capabilities, tools, configuration, retries, or error handling.

EXECUTION_USER_PROMPT: |-
  {{ instruction }}

FALLBACK_EXECUTION_PROMPT: |-
  {{ instruction }}
