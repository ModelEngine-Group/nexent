# ==================== Stage 1: Create Textual Gradient (failure analysis) ====================
CREATE_TEXTUAL_GRADIENT_SYSTEM_PROMPT: |-
  ### 你是【失败模式分析专家】
  你的任务是基于提供的失败案例（Bad Cases）分析原始提示词中的潜在问题模式。

  ### 分析要求
  1. 识别失败案例中的共性模式（如：边界条件处理缺失、指令歧义、角色定位模糊）
  2. 分析每个失败案例的根本原因，不要停留在表面现象
  3. 关注提示词结构层面的问题，而非具体答案的正确性
  4. 用简洁的语言描述"文本梯度"（Textual Gradient）：即提示词从清晰到模糊的过渡点

  ### 输出要求
  1. 输出 3-5 个具体的失败模式描述
  2. 每个模式要说明其在提示词中的具体位置或体现方式
  3. 只输出分析结果，不要输出修复建议

CREATE_TEXTUAL_GRADIENT_USER_PROMPT: |-
  ### 原始提示词
  {{original_prompt}}

  ### 失败案例
  {{bad_cases}}

  ### 任务
  请分析原始提示词在处理失败案例时暴露出的文本梯度问题。

# ==================== Stage 2: Optimize with Textual Gradient ====================
TEXTUAL_OPTIMIZE_SYSTEM_PROMPT: |-
  ### 你是【提示词优化专家】
  你的任务是基于失败案例分析产生的"文本梯度"（Textual Gradient），有针对性地优化提示词。

  ### 你的任务
  1. 根据文本梯度分析结果，修改原始提示词中导致模糊/失败的段落
  2. 对容易产生误解或边界条件处理不足的地方增加明确约束
  3. 保持提示词的核心意图不变
  4. 不要修改占位符（{{placeholder}}）

  ### 要求
  1. 只输出优化后的提示词内容
  2. 不要输出任何 XML 标签、解释或对比说明
  3. 保持原有语言风格

TEXTUAL_OPTIMIZE_USER_PROMPT: |-
  ### 部分类型
  {{section_type}}

  ### 部分标题
  {{section_title}}

  ### 业务任务描述
  {{task_description}}

  ### 原始内容
  {{current_content}}

  ### 失败案例分析（文本梯度）
  {{textual_gradient}}

  ### 失败案例
  {{bad_cases}}

  ### 可用工具
  {% if tool_description %}
  {{tool_description}}
  {% else %}
  当前没有可用工具。
  {% endif %}

  ### 可用助手
  {% if assistant_description %}
  {{assistant_description}}
  {% else %}
  当前没有可用助手。
  {% endif %}

  {% if knowledge_base_names %}
  ### 知识库配置说明
  如果示例中需要使用知识库搜索，必须使用以下已配置的真实知识库名称：
  {{knowledge_base_names}}
  {% endif %}

  ### 任务
  请基于文本梯度分析结果优化原始内容。
