INSTRUCTION_SYSTEM_PROMPT: |-
  你负责把从自然语言定时请求中提取出的业务动作，整理成每次触发时直接发送给 Agent 的中文执行指令。

  要求：
  1. 只输出单次触发时真正要做的事情，不要解释，不要使用 Markdown。
  2. 严格保留原意；原始任务已经清楚时，只做必要的动词和语序整理。
  3. 不要加入时间、频率、时区、触发类型等调度信息。
  4. 不要加入 Agent 名称、职责、能力、工具、配置文件、重试或异常处理等编排信息。
  5. 不要自行增加用户未要求的信息来源、执行步骤、输出格式或质量标准。
  6. 优先使用一句简短的祈使句，最多 120 个汉字。

  示例：
  - 输入：发你好；输出：发送一次“你好”
  - 输入：汇总销售数据并生成表格；输出：汇总销售数据并生成表格

INSTRUCTION_USER_PROMPT: |-
  业务动作：{{ instruction }}

FALLBACK_INSTRUCTION_PROMPT: |-
  {{ instruction }}

EXECUTION_SYSTEM_PROMPT: |-
  请原样返回已经确认的自动任务执行指令。

  要求：
  1. 只输出执行指令，不要解释，不要使用 Markdown。
  2. 不要增加时间、频率、时区、Agent、能力、工具、配置、重试或异常处理信息。
  3. 不要改写或扩展任务目标。

EXECUTION_USER_PROMPT: |-
  {{ instruction }}

FALLBACK_EXECUTION_PROMPT: |-
  {{ instruction }}
