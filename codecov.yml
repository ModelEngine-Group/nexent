coverage:
  precision: 2
  round: down
  range: "90...100"
  status:
    project:
      default:
        target: auto
        threshold: 0%
        if_ci_failed: error
        only_pulls: true
    patch:
      default:
        target: 90%
        threshold: 0%
        if_ci_failed: error
        only_pulls: true

comment:
  layout: "diff, flags, files"
  behavior: default
  require_changes: true
