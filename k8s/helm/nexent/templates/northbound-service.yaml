apiVersion: apps/v1
kind: Deployment
metadata:
  name: nexent-northbound
  namespace: {{ .Values.global.namespace }}
  labels:
    app: nexent-northbound
  annotations:
    "helm.sh/hook-weight": "20"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nexent-northbound
  template:
    metadata:
      labels:
        app: nexent-northbound
    spec:
      containers:
        - name: nexent-northbound
          image: "{{ .Values.images.backend.repository }}:{{ .Values.images.backend.tag }}"
          imagePullPolicy: {{ .Values.images.backend.pullPolicy }}
          ports:
            - containerPort: 5013
              name: http
          command:
            - /bin/bash
            - -c
            - python backend/northbound_service.py
          envFrom:
            - configMapRef:
                name: nexent-config
            - secretRef:
                name: nexent-secrets
          env:
            - name: skip_proxy
              value: {{ .Values.config.skipProxy | quote }}
            - name: UMASK
              value: {{ .Values.config.umask | quote }}
          resources:
            requests:
              memory: {{ .Values.resources.backend.requests.memory }}
              cpu: {{ .Values.resources.backend.requests.cpu }}
            limits:
              memory: {{ .Values.resources.backend.limits.memory }}
              cpu: {{ .Values.resources.backend.limits.cpu }}
---
apiVersion: v1
kind: Service
metadata:
  name: nexent-northbound
  namespace: {{ .Values.global.namespace }}
spec:
  type: {{ .Values.services.northbound.type }}
  ports:
    - port: 5013
      targetPort: 5013
      name: http
      {{- if eq .Values.services.northbound.type "NodePort" }}
      nodePort: {{ .Values.services.northbound.nodePort }}
      {{- end }}
  selector:
    app: nexent-northbound
