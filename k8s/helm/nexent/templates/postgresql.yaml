apiVersion: apps/v1
kind: Deployment
metadata:
  name: nexent-postgresql
  namespace: {{ .Values.global.namespace }}
  labels:
    app: nexent-postgresql
  annotations:
    "helm.sh/hook-weight": "-1"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nexent-postgresql
  template:
    metadata:
      labels:
        app: nexent-postgresql
    spec:

      containers:
        - name: postgresql
          image: "{{ .Values.images.postgresql.repository }}:{{ .Values.images.postgresql.tag }}"
          imagePullPolicy: {{ .Values.images.postgresql.pullPolicy }}
          ports:
            - containerPort: 5432
              name: postgres
          env:
            - name: POSTGRES_USER
              valueFrom:
                configMapKeyRef:
                  name: nexent-config
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: nexent-secrets
                  key: NEXENT_POSTGRES_PASSWORD
            - name: POSTGRES_DB
              valueFrom:
                configMapKeyRef:
                  name: nexent-config
                  key: POSTGRES_DB
          volumeMounts:
            - name: postgresql-data
              mountPath: /var/lib/postgresql/data
            - name: init-sql
              mountPath: /docker-entrypoint-initdb.d/init.sql
              subPath: init.sql
          resources:
            requests:
              memory: {{ .Values.resources.postgresql.requests.memory }}
              cpu: {{ .Values.resources.postgresql.requests.cpu }}
            limits:
              memory: {{ .Values.resources.postgresql.limits.memory }}
              cpu: {{ .Values.resources.postgresql.limits.cpu }}
          securityContext:
            allowPrivilegeEscalation: true
      volumes:
        - name: postgresql-data
          persistentVolumeClaim:
            claimName: nexent-postgresql
        - name: init-sql
          configMap:
            name: nexent-init-sql
---
apiVersion: v1
kind: Service
metadata:
  name: nexent-postgresql
  namespace: {{ .Values.global.namespace }}
spec:
  type: ClusterIP
  ports:
    - port: 5432
      targetPort: 5432
      name: postgres
  selector:
    app: nexent-postgresql
