{{- if eq .Values.global.deploymentVersion "full" }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nexent-supabase-auth
  namespace: {{ .Values.global.namespace }}
  labels:
    app: nexent-supabase-auth
  annotations:
    "helm.sh/hook-weight": "0"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nexent-supabase-auth
  template:
    metadata:
      labels:
        app: nexent-supabase-auth
    spec:
      initContainers:
        - name: init-db
          image: postgres:15-alpine
          imagePullPolicy: IfNotPresent
          env:
            - name: DB_HOST
              value: {{ .Values.config.supabase.postgresHost | quote }}
            - name: DB_PORT
              value: {{ .Values.config.supabase.postgresPort | quote }}
          command: ["/bin/sh", "-c"]
          args:
            - |
              until pg_isready -h $(DB_HOST) -p $(DB_PORT) -U postgres; do
              echo "Waiting for database to start..."
              sleep 2
              done
            - echo "Database is ready"
      containers:
        - name: supabase-auth
          image: "{{ .Values.images.supabase.gotrue.repository }}:{{ .Values.images.supabase.gotrue.tag }}"
          imagePullPolicy: {{ .Values.images.supabase.gotrue.pullPolicy }}
          env:
            - name: GOTRUE_API_HOST
              value: "0.0.0.0"
            - name: GOTRUE_API_PORT
              value: "9999"
            - name: API_EXTERNAL_URL
              valueFrom:
                configMapKeyRef:
                  name: nexent-config
                  key: API_EXTERNAL_URL
            - name: GOTRUE_DB_DRIVER
              value: "postgres"
            - name: GOTRUE_DB_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: nexent-secrets
                  key: GOTRUE_DB_DATABASE_URL
            - name: GOTRUE_SITE_URL
              valueFrom:
                configMapKeyRef:
                  name: nexent-config
                  key: SITE_URL
            - name: GOTRUE_URI_ALLOW_LIST
              valueFrom:
                configMapKeyRef:
                  name: nexent-config
                  key: ADDITIONAL_REDIRECT_URLS
            - name: GOTRUE_DISABLE_SIGNUP
              valueFrom:
                configMapKeyRef:
                  name: nexent-config
                  key: DISABLE_SIGNUP
            - name: GOTRUE_JWT_ADMIN_ROLES
              value: "service_role"
            - name: GOTRUE_JWT_AUD
              value: "authenticated"
            - name: GOTRUE_JWT_DEFAULT_GROUP_NAME
              value: "authenticated"
            - name: GOTRUE_JWT_EXP
              valueFrom:
                configMapKeyRef:
                  name: nexent-config
                  key: JWT_EXPIRY
            - name: GOTRUE_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: nexent-secrets
                  key: JWT_SECRET
            - name: GOTRUE_EXTERNAL_EMAIL_ENABLED
              valueFrom:
                configMapKeyRef:
                  name: nexent-config
                  key: ENABLE_EMAIL_SIGNUP
            - name: GOTRUE_EXTERNAL_ANONYMOUS_USERS_ENABLED
              valueFrom:
                configMapKeyRef:
                  name: nexent-config
                  key: ENABLE_ANONYMOUS_USERS
            - name: GOTRUE_MAILER_AUTOCONFIRM
              valueFrom:
                configMapKeyRef:
                  name: nexent-config
                  key: ENABLE_EMAIL_AUTOCONFIRM
            - name: GOTRUE_MAILER_URLPATHS_INVITE
              valueFrom:
                configMapKeyRef:
                  name: nexent-config
                  key: MAILER_URLPATHS_INVITE
            - name: GOTRUE_MAILER_URLPATHS_CONFIRMATION
              valueFrom:
                configMapKeyRef:
                  name: nexent-config
                  key: MAILER_URLPATHS_CONFIRMATION
            - name: GOTRUE_MAILER_URLPATHS_RECOVERY
              valueFrom:
                configMapKeyRef:
                  name: nexent-config
                  key: MAILER_URLPATHS_RECOVERY
            - name: GOTRUE_MAILER_URLPATHS_EMAIL_CHANGE
              valueFrom:
                configMapKeyRef:
                  name: nexent-config
                  key: MAILER_URLPATHS_EMAIL_CHANGE
            - name: GOTRUE_EXTERNAL_PHONE_ENABLED
              valueFrom:
                configMapKeyRef:
                  name: nexent-config
                  key: ENABLE_PHONE_SIGNUP
            - name: GOTRUE_SMS_AUTOCONFIRM
              valueFrom:
                configMapKeyRef:
                  name: nexent-config
                  key: ENABLE_PHONE_AUTOCONFIRM
          readinessProbe:
            httpGet:
              path: /health
              port: 9999
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 9999
            initialDelaySeconds: 30
            periodSeconds: 10
          ports:
            - containerPort: 9999
              name: auth
              protocol: TCP
          resources:
            requests:
              memory: {{ .Values.resources.supabaseAuth.requests.memory }}
              cpu: {{ .Values.resources.supabaseAuth.requests.cpu }}
            limits:
              memory: {{ .Values.resources.supabaseAuth.limits.memory }}
              cpu: {{ .Values.resources.supabaseAuth.limits.cpu }}
---
apiVersion: v1
kind: Service
metadata:
  name: nexent-supabase-auth
  namespace: {{ .Values.global.namespace }}
spec:
  type: ClusterIP
  ports:
    - port: 9999
      targetPort: 9999
      name: auth
  selector:
    app: nexent-supabase-auth
{{- end }}
