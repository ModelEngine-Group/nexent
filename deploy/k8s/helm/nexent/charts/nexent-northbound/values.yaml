replicaCount: 1

strategy:
  type: RollingUpdate
  rollingUpdate:
    maxSurge: 1
    maxUnavailable: 0

images:
  backend:
    repository: nexent/nexent
    tag: latest
    pullPolicy: IfNotPresent

resources:
  backend:
    requests:
      memory: 256Mi
      cpu: 500m
    limits:
      memory: 2Gi
      cpu: 1

config:
  skipProxy: "true"
  umask: "0022"

services:
  northbound:
    type: NodePort
    nodePort: 30013
