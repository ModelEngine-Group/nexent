replicaCount: 1

image:
  repository: quay.io/minio/minio
  tag: RELEASE.2023-12-20T01-00-02Z
  pullPolicy: IfNotPresent

resources:
  requests:
    memory: 256Mi
    cpu: 500m
  limits:
    memory: 2Gi
    cpu: 1

storage:
  size: 20Gi

persistence:
  mode: local
  storageClassName: nexent-local
  accessModes:
    - ReadWriteOnce
  localPath: "/var/lib/nexent-data/nexent-minio"
  existingClaim: ""

service:
  type: ClusterIP

config:
  region: "cn-north-1"
  defaultBucket: "nexent"
