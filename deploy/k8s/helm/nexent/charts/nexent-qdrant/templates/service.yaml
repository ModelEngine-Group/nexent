apiVersion: v1
kind: Service
metadata:
  name: nexent-qdrant
  namespace: {{ .Values.global.namespace }}
  labels:
    app: nexent-qdrant
spec:
  type: {{ default "ClusterIP" .Values.service.type }}
  ports:
    - port: 6333
      targetPort: 6333
      name: http
      {{- if and (eq (default "ClusterIP" .Values.service.type) "NodePort") .Values.service.nodePorts.http }}
      nodePort: {{ .Values.service.nodePorts.http }}
      {{- end }}
  selector:
    app: nexent-qdrant
