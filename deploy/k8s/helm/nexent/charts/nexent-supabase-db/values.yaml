replicaCount: 1

image:
  repository: supabase/postgres
  tag: 15.8.1.060
  pullPolicy: IfNotPresent

resources:
  requests:
    memory: 256Mi
    cpu: 500m
  limits:
    memory: 2Gi
    cpu: 1

storage:
  size: 10Gi

persistence:
  mode: local
  storageClassName: nexent-local
  accessModes:
    - ReadWriteOnce
  localPath: "/var/lib/nexent-data/nexent-supabase-db"
  localNodeName: ""
  existingClaim: ""

config:
  postgresDb: "supabase"
  postgresPort: "5436"
  jwtExpiry: "3600"

# SQL content is rendered by deploy/k8s/deploy.sh from deploy/sql/
# directory. Keep these empty in chart defaults to avoid maintaining a second
# SQL copy inside the chart.
initScripts:
  jwt: ""
  pooler: ""
  logs: ""
  realtime: ""
  roles: ""
  supabase: ""
  webhooks: ""
