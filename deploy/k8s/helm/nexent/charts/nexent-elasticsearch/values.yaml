replicaCount: 1

image:
  repository: docker.elastic.co/elasticsearch/elasticsearch
  tag: 8.17.4
  pullPolicy: IfNotPresent

resources:
  requests:
    memory: 512Mi
    cpu: 2
  limits:
    memory: 4Gi
    cpu: 2

storage:
  size: 20Gi

persistence:
  mode: local
  storageClassName: nexent-local
  accessModes:
    - ReadWriteOnce
  localPath: "/var/lib/nexent-data/nexent-elasticsearch"
  localNodeName: ""
  existingClaim: ""

config:
  javaOpts: "-Xms2g -Xmx2g"
  diskWatermarkLow: "85%"
  diskWatermarkHigh: "90%"
  diskWatermarkFloodStage: "95%"
