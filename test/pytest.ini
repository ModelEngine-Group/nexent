# pytest configuration file
[pytest]
# Automatically detect and handle async test functions
asyncio_mode = auto
# Create a new event loop for each test function to ensure isolation
asyncio_default_fixture_loop_scope = function
# Configure warning filters to ignore all warnings
filterwarnings =
    # Disable all warnings
    ignore

# Custom markers
markers =
    local_only: marks tests that require external resources (API keys, network) and should only run locally (deselect with '-m "not local_only"')
